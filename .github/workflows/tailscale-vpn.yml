name: Tailscale VPN Node

on:
  workflow_dispatch:
    inputs:
      hostname:
        type: string
        description: 'Tailscale hostname'
        required: false
        default: 'gh-node'
      duration:
        type: string
        description: 'Keep-alive duration in hours'
        required: false
        default: '5'

jobs:
  tailscale-node:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - name: System Information
        run: |
          echo "=== System Info ==="
          uname -a
          cat /etc/os-release
          df -h
          free -h
          nproc
          echo ""
          echo "Public IP: $(curl -s --max-time 5 ifconfig.me || curl -s --max-time 5 icanhazip.com)"

      - name: Configure SSH Access
        env:
          GH_SSH_ROOT_PASS: ${{ secrets.GH_SSH_ROOT_PASS }}
          GH_SSH_USER_PASS: ${{ secrets.GH_SSH_USER_PASS }}
        run: |
          USER_PASS="${GH_SSH_USER_PASS:-123456}"
          sudo useradd -m -s /bin/bash jiro 2>/dev/null || true
          echo "jiro:${USER_PASS}" | sudo chpasswd
          sudo sh -c 'echo "jiro ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers'

          ROOT_PASS="${GH_SSH_ROOT_PASS:-nihao}"
          sudo sed -i 's/^#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh
          echo "root:${ROOT_PASS}" | sudo chpasswd

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale version

      - name: Connect to Tailscale
        env:
          TS_KEY: ${{ secrets.TS_KEY }}
          HOSTNAME: ${{ github.event.inputs.hostname || 'gh-node' }}
        run: |
          if [ -z "$TS_KEY" ]; then
            echo "ERROR: TS_KEY secret not configured"
            echo "Please add TS_KEY (Tailscale Auth Key) to repository secrets"
            exit 1
          fi

          echo "Connecting to Tailscale with hostname: ${HOSTNAME}"
          sudo tailscale up --authkey="${TS_KEY}" --hostname="${HOSTNAME}" --ssh

          # Wait for connection
          sleep 5

          # Get Tailscale IP
          TS_IP=$(sudo tailscale ip -4)
          TS_IP_V6=$(sudo tailscale ip -6 2>/dev/null || echo "N/A")

          echo "=========================================================="
          echo "  TAILSCALE NODE READY"
          echo "=========================================================="
          echo ""
          echo "Hostname: ${HOSTNAME}"
          echo "Tailscale IPv4: ${TS_IP}"
          echo "Tailscale IPv6: ${TS_IP_V6}"
          echo ""
          echo "SSH Command: ssh root@${TS_IP}"
          echo "SSH Password: nihao (or custom GH_SSH_ROOT_PASS)"
          echo ""
          echo "Or using hostname: ssh root@${HOSTNAME}"
          echo "=========================================================="

          # Save to outputs
          echo "ts_ip=${TS_IP}" >> $GITHUB_OUTPUT
          echo "ts_ip_v6=${TS_IP_V6}" >> $GITHUB_OUTPUT
          echo "hostname=${HOSTNAME}" >> $GITHUB_OUTPUT

          # Add to GitHub Step Summary
          echo "## Tailscale Connection Info" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Hostname | \`${HOSTNAME}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| IPv4 | \`${TS_IP}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| IPv6 | \`${TS_IP_V6}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SSH | \`ssh root@${TS_IP}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Password | \`nihao\` |" >> $GITHUB_STEP_SUMMARY

      - name: Send to Feishu
        env:
          FS_TOKEN: ${{ secrets.FS_TOKEN }}
          TS_IP: ${{ steps.tailscale-node.outputs.ts_ip }}
          HOSTNAME: ${{ github.event.inputs.hostname || 'gh-node' }}
        run: |
          if [ -z "$FS_TOKEN" ]; then
            echo "FS_TOKEN not configured, skipping notification"
            exit 0
          fi

          CONTENT="Tailscale VPN Node Ready\n\nHostname: ${HOSTNAME}\nIP: ${TS_IP}\nSSH: ssh root@${TS_IP}\nPassword: nihao"

          webhook_url="https://open.feishu.cn/open-apis/bot/v2/hook/${FS_TOKEN}"
          message=$(printf '{"msg_type":"text","content":{"text":"%s"}}' "$CONTENT")
          curl -s -H "Content-Type: application/json" -X POST -d "$message" "$webhook_url"
          echo "Sent to Feishu"

      - name: Keep Alive
        env:
          DURATION: ${{ github.event.inputs.duration || '5' }}
        run: |
          echo "Keeping alive for ${DURATION} hours..."
          END_TIME=$(($(date +%s) + ${DURATION} * 3600))
          while [ $(date +%s) -lt $END_TIME ]; do
            sleep 300
            TS_STATUS=$(sudo tailscale status --json 2>/dev/null | grep -o '"Online":true' || echo "Offline")
            echo "[$(date)] Health check - Tailscale: ${TS_STATUS}"
          done